# Decap CMS 配置

backend:
  name: github
  repo: YouliGit/YouliGit.github.io
  branch: master
  base_url: https://youli-gk7rdu21i-youligits-projects.vercel.app
  auth_endpoint: auth

media_folder: src/content/posts/images
public_folder: ./images

collections:
  - name: "posts"
    label: "文章"
    label_singular: "文章"
    folder: "src/content/posts"
    create: true
    delete: true
    path: "{{slug}}/index"
    preview_path: "posts/{{slug}}"
    sortable_fields: ["published", "title"]
    fields:
      - { label: "标题", name: "title", widget: "string" }
      - { label: "发布日期", name: "published", widget: "datetime", format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false }
      - { label: "更新日期", name: "updated", widget: "datetime", format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false, required: false }
      - { label: "描述", name: "description", widget: "text", required: false }
      - { label: "封面图片", name: "image", widget: "image", required: false }
      - { label: "标签", name: "tags", widget: "list", required: false }
      - { label: "分类", name: "category", widget: "string", required: false }
      - { label: "草稿", name: "draft", widget: "boolean", default: false, required: false }
      - { label: "置顶", name: "pinned", widget: "boolean", default: false, required: false }
      - { label: "自定义 URL", name: "slug", widget: "string", required: false, hint: "不填则使用文件名" }
      - { label: "文章语言", name: "lang", widget: "string", required: false }
      - { label: "正文", name: "body", widget: "markdown" }
